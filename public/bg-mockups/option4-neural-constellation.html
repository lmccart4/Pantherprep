<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PantherPrep - Neural Constellation Background</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f8f7f5;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .overlay {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .badge {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #d62828;
    background: rgba(214, 40, 40, 0.08);
    border: 1px solid rgba(214, 40, 40, 0.15);
    padding: 6px 18px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    font-weight: 600;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5.5rem;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.03em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  h1 span { color: #d62828; }
  .subtitle {
    font-size: 1.1rem;
    color: #777;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 2.5rem;
  }
  .sample-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 16px;
    padding: 2rem 3rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    max-width: 500px;
    text-align: left;
  }
  .sample-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: #1a1a1a;
    margin-bottom: 0.5rem;
  }
  .sample-card p {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.7;
  }
  .label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #aaa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 10;
    background: rgba(255,255,255,0.7);
    padding: 8px 20px;
    border-radius: 100px;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="badge">Option 4 - Neural Constellation</div>
  <h1>Panther<span>Prep</span></h1>
  <p class="subtitle">Your Path to Success</p>
  <div class="sample-card">
    <h3>Sample Content Card</h3>
    <p>This is how content would appear overlaid on the neural constellation background. Stars fade in and out, forming ever-changing network topologies.</p>
  </div>
</div>
<div class="label">Neural Constellation - Emergent Network Topology</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w, h;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  w = canvas.width = window.innerWidth * DPR;
  h = canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}

class Star {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 2.5 + 0.8;
    this.maxOpacity = Math.random() * 0.5 + 0.15;
    this.opacity = 0;
    this.fadeSpeed = Math.random() * 0.003 + 0.001;
    this.phase = 'in'; // in, hold, out
    this.holdTime = Math.random() * 400 + 200;
    this.holdCounter = 0;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
  }
  update(t) {
    this.x += this.vx;
    this.y += this.vy;

    // Wrap
    if (this.x < -20) this.x = w + 20;
    if (this.x > w + 20) this.x = -20;
    if (this.y < -20) this.y = h + 20;
    if (this.y > h + 20) this.y = -20;

    this.twinklePhase += this.twinkleSpeed;
    const twinkle = 0.85 + Math.sin(this.twinklePhase) * 0.15;

    switch (this.phase) {
      case 'in':
        this.opacity += this.fadeSpeed;
        if (this.opacity >= this.maxOpacity) {
          this.opacity = this.maxOpacity;
          this.phase = 'hold';
        }
        break;
      case 'hold':
        this.holdCounter++;
        this.opacity = this.maxOpacity * twinkle;
        if (this.holdCounter >= this.holdTime) this.phase = 'out';
        break;
      case 'out':
        this.opacity -= this.fadeSpeed * 0.7;
        if (this.opacity <= 0) {
          this.opacity = 0;
          this.reset();
        }
        break;
    }
  }
  draw() {
    if (this.opacity <= 0) return;

    // Outer glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * DPR * 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${this.opacity * 0.04})`;
    ctx.fill();

    // Inner glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * DPR * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${this.opacity * 0.1})`;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * DPR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${this.opacity})`;
    ctx.fill();

    // Bright center
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * DPR * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 120, 120, ${this.opacity * 0.6})`;
    ctx.fill();
  }
}

let stars = [];
const CONN_DIST = 160 * DPR;

function init() {
  resize();
  const count = Math.min(Math.floor((w * h) / 18000), 150);
  stars = Array.from({ length: count }, () => {
    const s = new Star();
    // Stagger initial states
    if (Math.random() > 0.5) {
      s.phase = 'hold';
      s.opacity = s.maxOpacity;
      s.holdCounter = Math.floor(Math.random() * s.holdTime);
    }
    return s;
  });
}

function drawConnections() {
  for (let i = 0; i < stars.length; i++) {
    if (stars[i].opacity < 0.05) continue;
    for (let j = i + 1; j < stars.length; j++) {
      if (stars[j].opacity < 0.05) continue;
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONN_DIST) {
        const strength = (1 - dist / CONN_DIST);
        const alpha = strength * Math.min(stars[i].opacity, stars[j].opacity) * 0.35;

        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.strokeStyle = `rgba(214, 40, 40, ${alpha})`;
        ctx.lineWidth = strength * 1.5;
        ctx.stroke();
      }
    }
  }
}

// Signal pulses along connections
class Signal {
  constructor(starA, starB) {
    this.a = starA;
    this.b = starB;
    this.progress = 0;
    this.speed = Math.random() * 0.015 + 0.005;
    this.size = Math.random() * 2 + 1.5;
    this.alive = true;
  }
  update() {
    this.progress += this.speed;
    if (this.progress >= 1) this.alive = false;
  }
  draw() {
    const x = this.a.x + (this.b.x - this.a.x) * this.progress;
    const y = this.a.y + (this.b.y - this.a.y) * this.progress;
    const alpha = Math.sin(this.progress * Math.PI) * 0.5;

    ctx.beginPath();
    ctx.arc(x, y, this.size * DPR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230, 70, 70, ${alpha})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, this.size * DPR * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${alpha * 0.15})`;
    ctx.fill();
  }
}

let signals = [];

function spawnSignal() {
  // Find two connected, visible stars
  for (let attempt = 0; attempt < 10; attempt++) {
    const i = Math.floor(Math.random() * stars.length);
    const j = Math.floor(Math.random() * stars.length);
    if (i === j) continue;
    if (stars[i].opacity < 0.1 || stars[j].opacity < 0.1) continue;
    const dx = stars[i].x - stars[j].x;
    const dy = stars[i].y - stars[j].y;
    if (Math.sqrt(dx * dx + dy * dy) < CONN_DIST) {
      signals.push(new Signal(stars[i], stars[j]));
      return;
    }
  }
}

function animate(t) {
  ctx.clearRect(0, 0, w, h);

  stars.forEach(s => s.update(t));
  drawConnections();

  // Spawn signals occasionally
  if (Math.random() < 0.04) spawnSignal();

  signals.forEach(s => { s.update(); s.draw(); });
  signals = signals.filter(s => s.alive);

  stars.forEach(s => s.draw());

  requestAnimationFrame(animate);
}

window.addEventListener('resize', init);
init();
requestAnimationFrame(animate);
</script>
</body>
</html>

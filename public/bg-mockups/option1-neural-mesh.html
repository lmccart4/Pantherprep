<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PantherPrep - Neural Mesh Background</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f8f7f5;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Manrope', sans-serif;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .overlay {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .badge {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #d62828;
    background: rgba(214, 40, 40, 0.08);
    border: 1px solid rgba(214, 40, 40, 0.15);
    padding: 6px 18px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    font-weight: 600;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5.5rem;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: 0.03em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  h1 span { color: #d62828; }
  .subtitle {
    font-size: 1.1rem;
    color: #777;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 2.5rem;
  }
  .sample-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 16px;
    padding: 2rem 3rem;
    box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    max-width: 500px;
    text-align: left;
  }
  .sample-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: #1a1a1a;
    margin-bottom: 0.5rem;
  }
  .sample-card p {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.7;
  }
  .label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #aaa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 10;
    background: rgba(255,255,255,0.7);
    padding: 8px 20px;
    border-radius: 100px;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="badge">Option 1 - Neural Mesh</div>
  <h1>Panther<span>Prep</span></h1>
  <p class="subtitle">Your Path to Success</p>
  <div class="sample-card">
    <h3>Sample Content Card</h3>
    <p>This is how content would appear overlaid on the neural mesh background. The interconnected nodes drift and reconnect organically.</p>
  </div>
</div>
<div class="label">Neural Mesh - Drifting Node Network</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w, h, nodes, mouse = { x: -1000, y: -1000 };
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  w = canvas.width = window.innerWidth * DPR;
  h = canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}

class Node {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.radius = Math.random() * 2.5 + 1.5;
    this.baseRadius = this.radius;
    this.pulseOffset = Math.random() * Math.PI * 2;
    this.opacity = Math.random() * 0.4 + 0.2;
  }
  update(t) {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > w) this.vx *= -1;
    if (this.y < 0 || this.y > h) this.vy *= -1;
    this.radius = this.baseRadius + Math.sin(t * 0.002 + this.pulseOffset) * 0.8;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * DPR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${this.opacity})`;
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * DPR * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(214, 40, 40, ${this.opacity * 0.08})`;
    ctx.fill();
  }
}

function init() {
  resize();
  const count = Math.min(Math.floor((w * h) / 25000), 120);
  nodes = Array.from({ length: count }, () => new Node());
}

function drawConnections() {
  const maxDist = 180 * DPR;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.12;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(214, 40, 40, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }
}

function drawSignals(t) {
  const maxDist = 180 * DPR;
  const signalSpeed = 0.001;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist * 0.6) {
        const progress = ((t * signalSpeed + i * 0.3 + j * 0.17) % 1);
        const sx = nodes[i].x + (nodes[j].x - nodes[i].x) * progress;
        const sy = nodes[i].y + (nodes[j].y - nodes[i].y) * progress;
        const alpha = Math.sin(progress * Math.PI) * 0.35;
        ctx.beginPath();
        ctx.arc(sx, sy, 2 * DPR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(214, 40, 40, ${alpha})`;
        ctx.fill();
      }
    }
  }
}

let frame = 0;
function animate(t) {
  ctx.clearRect(0, 0, w, h);
  nodes.forEach(n => n.update(t));
  drawConnections();
  if (frame % 2 === 0) drawSignals(t);
  nodes.forEach(n => n.draw());
  frame++;
  requestAnimationFrame(animate);
}

window.addEventListener('resize', init);
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX * DPR;
  mouse.y = e.clientY * DPR;
});
init();
requestAnimationFrame(animate);
</script>
</body>
</html>
